<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Petition Signed — O.V.E.R</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Nunito:wght@400;700;900&family=Courier+Prime&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060c1a;color:#f8faff;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.icon{font-size:100px;margin-bottom:24px;filter:drop-shadow(0 0 40px rgba(239,68,68,0.7));animation:pulse 2s ease-in-out infinite;display:block;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.badge{background:rgba(239,68,68,0.1);border:1px solid #ef4444;padding:6px 28px;border-radius:100px;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:4px;color:#ef4444;margin-bottom:24px;display:inline-block;}
h1{font-family:'Oswald',sans-serif;font-size:clamp(32px,8vw,72px);letter-spacing:5px;margin-bottom:12px;}
h1 span{color:#ef4444;}
.sub{font-size:17px;color:#a0a8b8;margin-bottom:40px;max-width:540px;line-height:1.7;}
.share-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.share-btn{background:linear-gradient(135deg,#ef4444,#6c3fc5);color:#fff;padding:14px 32px;font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:3px;font-weight:700;border-radius:8px;text-decoration:none;display:inline-block;transition:all .2s;}
.share-btn:hover{transform:translateY(-2px);}
.back{color:#ef4444;font-weight:700;font-size:15px;text-decoration:none;border-bottom:1px solid #ef4444;padding-bottom:2px;}
</style>
</head>
<body>
<span class="icon">✍️</span>
<div class="badge">✅ PETITION SIGNATURE CONFIRMED</div>
<h1>YOU <span>SIGNED.</span></h1>
<p class="sub">Your name is on the petition. When we hit 1,000 signatures, we deliver this to real lawmakers and demand they make ridiculing disabled people illegal. Tell everyone to sign.</p>
<div class="share-row">
  <a class="share-btn" href="petition.html">👀 SEE THE PETITION</a>
  <a class="share-btn" href="share.html" style="background:linear-gradient(135deg,#22c55e,#0ea5a0);">📲 MAKE A SHARE CARD</a>
</div>
<a href="index.html" class="back">← BACK TO O.V.E.R</a>
</body>
</html>
